# =============================================================================
# TEST PROFILE - in-memory H2 (PostgreSQL compatibility mode)
# =============================================================================
# Used by integration / repository / context tests. Pure Mockito unit tests do
# not load Spring and ignore this file.

# --- Datasource: H2 in-memory, PostgreSQL-compatible ---
spring.datasource.url=jdbc:h2:mem:statustest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA: let Hibernate build the schema from entities, drop on shutdown ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Flyway disabled: schema comes from Hibernate, migrations are Postgres-specific ---
spring.flyway.enabled=false

# --- Fixed JWT secret for deterministic token tests (Base64, >=256 bits) ---
jwt.secret=dGhpc2lzYXNlY3JldGtleWZvcmp3dGF1dGhlbnRpY2F0aW9uYW5kYXV0aG9yaXphdGlvbjEyMw==
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# --- Disable background schedulers / initializers / email during tests ---
scheduler.enabled=false
health-check.enabled=false
data.initializer.enabled=false
app.email.enabled=false
app.setup.completed=true

# --- Deterministic scheduler encryption key (Base64 32 bytes) ---
scheduler.encryption.key=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

# --- Quiet logging in tests ---
logging.level.org.springframework.security=WARN
logging.level.org.automatize.status=WARN
logging.level.org.hibernate=WARN

app.build.date=test
