<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Select Context - Status Monitor</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg"/>
    <link rel="stylesheet" href="/static/css/tabler.min.css">
    <link rel="stylesheet" href="/static/css/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        .context-panel {
            height: 420px;
            overflow-y: auto;
        }
        .context-item {
            border: none;
            border-radius: 0;
            padding: 0.875rem 1.25rem;
            cursor: pointer;
            transition: background-color 0.1s;
            border-left: 3px solid transparent;
        }
        .context-item:hover {
            background-color: var(--tblr-bg-surface-secondary);
        }
        .context-item.active {
            background-color: rgba(var(--tblr-primary-rgb), 0.06);
            border-left-color: var(--tblr-primary);
        }
        .context-item.active .item-name {
            color: var(--tblr-primary);
            font-weight: 600;
        }
        .context-item .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        .context-item .item-name {
            font-size: 0.9375rem;
            font-weight: 500;
            line-height: 1.3;
        }
        .context-item .item-meta {
            font-size: 0.8125rem;
            color: var(--tblr-secondary);
        }
        .panel-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--tblr-border-color);
            background: var(--tblr-bg-surface-secondary);
        }
        .panel-header h5 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--tblr-secondary);
            margin: 0;
        }
        .split-card {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08), 0 4px 24px rgba(0,0,0,0.06);
        }
        .divider-col {
            border-right: 1px solid var(--tblr-border-color);
        }
        .org-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--tblr-secondary);
            gap: 0.5rem;
        }
        .selection-bar {
            background: var(--tblr-bg-surface);
            border: 1px solid var(--tblr-border-color);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .selection-crumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--tblr-secondary);
        }
        .crumb-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .crumb-item.filled {
            color: var(--tblr-body-color);
            font-weight: 500;
        }
        .crumb-sep {
            color: var(--tblr-border-color-dark);
        }
    </style>
</head>
<body class="bg-body-tertiary d-flex flex-column min-vh-100">
    <div class="flex-fill d-flex align-items-center justify-content-center py-5">
        <div style="width: 100%; max-width: 820px; padding: 0 1rem;">

            <!-- Page header -->
            <div class="d-flex align-items-center mb-4 gap-3">
                <div class="avatar bg-primary text-white" style="width:48px;height:48px;font-size:1.25rem;">
                    <i class="ti ti-switch-3"></i>
                </div>
                <div>
                    <h2 class="mb-0" style="font-size:1.375rem;">Select Working Context</h2>
                    <p class="text-muted mb-0" style="font-size:0.875rem;">Choose a tenant and organization to continue</p>
                </div>
            </div>

            <!-- Split panel -->
            <div class="split-card card mb-3">
                <div class="row g-0">

                    <!-- Tenants column -->
                    <div class="col-5 divider-col d-flex flex-column">
                        <div class="panel-header">
                            <h5><i class="ti ti-building me-2 text-primary"></i>Tenant</h5>
                        </div>
                        <div class="context-panel flex-fill" id="tenantsContainer">
                            <div class="d-flex align-items-center justify-content-center h-100 text-muted">
                                <span class="spinner-border spinner-border-sm me-2"></span>Loading...
                            </div>
                        </div>
                    </div>

                    <!-- Organizations column -->
                    <div class="col-7 d-flex flex-column">
                        <div class="panel-header d-flex align-items-center justify-content-between">
                            <h5><i class="ti ti-sitemap me-2 text-green"></i>Organization</h5>
                            <span class="badge bg-primary-lt text-primary d-none" id="selectedTenantBadge" style="font-size:0.75rem;text-transform:none;letter-spacing:0;font-weight:500;"></span>
                        </div>
                        <div class="context-panel flex-fill" id="orgsContainer">
                            <div class="org-placeholder text-muted" style="height:100%;">
                                <i class="ti ti-arrow-left" style="font-size:1.5rem;opacity:0.4;"></i>
                                <span style="font-size:0.875rem;">Select a tenant first</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Selection summary + confirm -->
            <div class="selection-bar">
                <div class="selection-crumb">
                    <div class="crumb-item" id="crumbTenant">
                        <i class="ti ti-building" style="font-size:1rem;"></i>
                        <span id="crumbTenantName">No tenant selected</span>
                    </div>
                    <span class="crumb-sep"><i class="ti ti-chevron-right" style="font-size:0.9rem;"></i></span>
                    <div class="crumb-item" id="crumbOrg">
                        <i class="ti ti-sitemap" style="font-size:1rem;"></i>
                        <span id="crumbOrgName">No organization selected</span>
                    </div>
                </div>
                <button class="btn btn-primary" id="confirmBtn" disabled style="white-space:nowrap;">
                    <i class="ti ti-arrow-right me-1"></i>Enter Admin Panel
                </button>
            </div>

        </div>
    </div>

    <div id="notifications-container" class="position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

    <script src="/static/js/vendor/bootstrap.bundle.min.js"></script>
    <script src="/static/js/shared/auth.js"></script>
    <script src="/static/js/shared/api.js"></script>
    <script src="/static/js/shared/notifications.js"></script>
    <script src="/static/js/admin/select-context/select-context.js"></script>
</body>
</html>
